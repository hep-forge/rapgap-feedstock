c_stdlib:
  - sysroot                    # [linux]
  - macosx_deployment_target   # [osx]

c_stdlib_version:
  - 2.17  # [linux]
  - 11.0  # [osx]

root:
  # 6.36 dropped: hepmc-feedstock stopped building hepmc for root636
  # (never had an aarch64 build for that slot; see hepmc-feedstock's
  # own conda_build_config.yaml), so this variant was unconditionally
  # unsatisfiable on arm64. rivet<4 (3.1.11) is only published for
  # root634 anyway, so 6.34 is the only variant that actually solves.
  - 6.34

packages:
  - numpy
